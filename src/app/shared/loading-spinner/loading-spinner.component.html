@if (!error) {
  <div class="w-100 p-3">
    <div class="loading-spinner">
      <!-- <div class="main-content"> -->
      <div class="spinner">
        <div class="bounce1"></div>
        <div class="bounce2"></div>
        <div class="bounce3"></div>
      </div>
      @if (!message) {
        <h3>Calculating Results...</h3>
      }
      @if (message) {
        <h3>{{message}}</h3>
      }
    <!-- </div> -->
  </div>
</div>
}

@if (error) {
  <div class="alert alert-danger">
    An error occured during calculations.
  </div>
}
