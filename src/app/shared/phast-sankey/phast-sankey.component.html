<div [ngClass]="{'chart-hide': !phast.valid.isValid, 'chart-show': phast.valid.isValid}">
  <div #ngChart></div>
  @if (minLosses.length > 0) {
    <div class="ml-5">
      <div class="ml-5 mt-2">
        <label class="group-label mb-2">Negligible Losses (not shown)</label>
        <table class="small w-25 ml-3">
          @for (loss of minLosses; track loss) {
            <tr>
              <td>{{ loss.name}}</td>
              <td>{{ loss.text}}</td>
            </tr>
          }
        </table>
      </div>
    </div>
  }
</div>

@if (!phast.valid.isValid) {
  <div class="w-75 ml-auto mr-auto mt-3">
    <app-invalid-phast [phastValid]="phast.valid"></app-invalid-phast>
  </div>
}
