<form [formGroup]="form" class="p-0">
    <div class="checkbox">
        <label class="group-label" for="replaceCompressors">
            Add or Replace Compressors
            <!-- <span class="supply-demand">
                Demand
            </span> -->
            <!-- <span *ngIf="form.invalid && form.controls.order.value != 100">
                <span class="fa fa-exclamation-circle"></span>
            </span> -->
            <select id="replaceCompressorsOrder" formControlName="order" class="form-control pull-right" (change)="save(true)">
                <option [ngValue]=100>Off</option>
                <option *ngFor="let option of orderOptions" [ngValue]="option">{{option}}</option>
            </select>
        </label>
    </div>

    <div class="py-2">
        <div class="d-flex flex-row justify-content-around">
            <a class="click-link small form-text" (click)="selectCompressorForReplacement()">Replace a Compressor</a>
            <div class="divider mx-2 my-0"></div>
            <a class="click-link small form-text" (click)="manageModificationCompressors()">Add/Manage Modified Compressors</a>
        </div>
        <hr class="mt-2">
        
        <div class="form-group my-1" [ngClass]="{'invalid': form.controls.implementationCost.invalid}">
            <label for="replaceCompressorImplementationCost">Implementation Cost</label>
            <div class="input-group">
                <input type="number" class="form-control" formControlName="implementationCost"
                    name="replaceCompressorImplementationCost" id="replaceCompressorImplementationCost" (input)="save(false)"
                    (focus)="helpTextField('implementationCost')" min="0">
                <span class="input-group-addon units">$</span>
            </div>
            <span class="alert-danger pull-right small"
                *ngIf="form.controls.implementationCost.invalid && !form.controls.implementationCost.pristine">
                <span *ngIf="form.controls.implementationCost.errors.min">Value can't be negative.
                </span>
            </span>
        </div>
    </div>
</form>

<div bsModal #replacementModal="bs-modal" class="modal fade" tabindex="-1" role="dialog"
    aria-labelledby="replacementModalLabel" aria-hidden="true" [config]="{backdrop: 'fixed'}">
    <div #modalDialog class="modal-dialog modal-lg replace-modal">
        <app-replace-compressor-modal *ngIf="showReplacementModal" [settings]="settings" 
            [replaceCompressorsEEM]="replaceCompressorsEEM" [bodyHeight]="bodyHeight"
            (saveReplaceCompressorsEEMData)="closeReplacementModal($event)"></app-replace-compressor-modal>
    </div>
</div>
