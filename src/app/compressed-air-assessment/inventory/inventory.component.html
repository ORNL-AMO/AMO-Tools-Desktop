<div class="d-flex flex-column panel-container pb-4">
    <div class="header mr-2 ml-2">
        <h3>Compressor Inventory
        </h3>
        <br>
    </div>
    <div class="p-3 no-data" *ngIf="!hasInventoryItems">
        <h3>Add your compressor Inventory for analysis..</h3>
        <button type="button" class="btn btn-primary active" (click)="addInventoryItem()">+Add Compressor</button>
    </div>
    <div class="mr-2 ml-2" *ngIf="hasInventoryItems">
        <ng-container *ngIf="inModifiedInventory && selectedCompressor.compressorReplacementData">
            <span *ngIf="selectedCompressor.compressorReplacementData.replacesCompressorName" class="alert alert-compressor small">
                <span class="ml-2 text-center">Replaces compressor: <b>{{selectedCompressor.compressorReplacementData.replacesCompressorName}}</b></span>
            </span>
            <span *ngIf="selectedCompressor.compressorReplacementData.replacedByCompressorName" class="alert alert-warning small d-flex m-0 mt-1 p-1 w-100">
                <span class="ml-2 text-center">Replaced by compressor: <b>{{selectedCompressor.compressorReplacementData.replacedByCompressorName}}</b></span>
            </span>
        </ng-container>
        <form [formGroup]="form">
            <div class="form-group">
                <label for="name">Compressor Name</label>
                <input type="text" class="form-control" name="name" formControlName="name" (focus)="focusField('compresorName')" (input)="save()" />
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea class="form-control" type="text" id="description" formControlName="description"
                (focus)="focusField('compresorDescription')" (input)="save()"></textarea>
            </div>
            <a class="click-link small pull-right" (click)="openCompressorModal()">Set Data From Existing Compressor</a>
        </form>
        <app-nameplate-data></app-nameplate-data>
        <app-control-data></app-control-data>
        <app-design-details *ngIf="compressorType != undefined && controlType != undefined"></app-design-details>
        <app-centrifugal-specifics *ngIf="compressorType == 6 && controlType != undefined"></app-centrifugal-specifics>
        <app-performance-points *ngIf="compressorType != undefined && controlType != undefined"></app-performance-points>
    </div>
</div>

<app-generic-compressor-modal *ngIf="showCompressorModal" [inModifiedInventory]="inModifiedInventory" (emitClose)="closeCompressorModal()">
</app-generic-compressor-modal>
