<div class="d-flex w-100 align-items-center pt-px">
    <div class="d-flex align-items-center w-100 to-dearator justify-content-center"
        (mouseenter)="hoverEquipment('boilerBlowdownFlashedHovered')" (mouseleave)="hoverEquipment('blowdownHovered')">
        <div class="outlet-steam-holder">
            <span class="outlet-steam-mass-flow" *ngIf="flashTank.outletGasMassFlow != 0">{{flashTank.outletGasMassFlow
                |
                number:'1.0-2'}}
                <span [innerHTML]="settings.steamMassFlowMeasurement | settingsLabel:'/hr'"></span>
            </span>
            <span class="fa fa-chevron-left"></span>
        </div>
    </div>
</div>
