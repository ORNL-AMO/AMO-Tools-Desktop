<div class="report-container">
  <div class="d-none d-lg-flex">
    <ul class="tabs primary">
      @for (link of REPORT_VIEW_LINKS; track $index) {
        <li routerLinkActive="active" [routerLink]="[link.view]">
          <a [routerLink]="[link.view]">{{link.label}}</a>
        </li>
      }
    </ul>
  </div>

  <div class="assessment-container tab-content">
    <div class="assessment-panel-container modification">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
