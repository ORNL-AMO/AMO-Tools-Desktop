<div class="panel-container p-3">
  <form [formGroup]="form">
    <div class="form-group">
      <label for="hoursPerYear">Operating Hours</label>
      <div class="input-group">
        <input name="hoursPerYear" type="number" step="10" class="form-control" id="hoursPerYear"
          formControlName="hoursPerYear">
        <span class="input-group-addon units">hrs/yr</span>
      </div>
      <app-form-control-errors [control]="hoursPerYear" [settings]="settings()"
        [imperialUnit]="'hrs/yr'" [metricUnit]="'hrs/yr'"></app-form-control-errors>
    </div>

    <div class="form-group">
      <label for="fuelCost">Fuel Cost</label>
      <div class="input-group">
        <input name="fuelCost" type="number" step="0.1" class="form-control" id="fuelCost"
          formControlName="fuelCost">
        @if (settings().unitsOfMeasure === 'Imperial') {
          <span class="input-group-addon units">$/MMBtu</span>
        } @else {
          <span class="input-group-addon units">$/GJ</span>
        }
      </div>
      <app-form-control-errors [control]="fuelCost" [settings]="settings()"
        [imperialUnit]="'$/MMBtu'" [metricUnit]="'$/GJ'"></app-form-control-errors>
    </div>

    <div class="form-group">
      <label for="steamCost">Steam Cost</label>
      <div class="input-group">
        <input name="steamCost" type="number" step="0.1" class="form-control" id="steamCost"
          formControlName="steamCost">
        @if (settings().unitsOfMeasure === 'Imperial') {
          <span class="input-group-addon units">$/MMBtu</span>
        } @else {
          <span class="input-group-addon units">$/GJ</span>
        }
      </div>
      <app-form-control-errors [control]="steamCost" [settings]="settings()"
        [imperialUnit]="'$/MMBtu'" [metricUnit]="'$/GJ'"></app-form-control-errors>
    </div>

    <div class="form-group">
      <label for="electricityCost">Electricity Cost</label>
      <div class="input-group">
        <input name="electricityCost" type="number" step="0.01" class="form-control" id="electricityCost"
          formControlName="electricityCost">
        <span class="input-group-addon units">$/kWh</span>
      </div>
      <app-form-control-errors [control]="electricityCost" [settings]="settings()"
        [defaultUnit]="'$/kWh'"></app-form-control-errors>
    </div>
  </form>
</div>
