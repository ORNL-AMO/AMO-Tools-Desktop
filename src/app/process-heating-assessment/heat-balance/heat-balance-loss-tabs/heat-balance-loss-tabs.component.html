<!-- LARGE VIEWPORT TABS -->
<ul class="tabs subtabs progress-tabs process-heating-assessment d-none d-lg-block">
  @for (link of HEAT_BALANCE_VIEW_LINKS; track $index) {
    @let isDisabled = isLinkDisabled(link);
    <li routerLinkActive="active" [routerLink]="[link.view]"
        [class.disabled]="isDisabled"
        (click)="handleCanNavigate($event, link)">
      <a routerLinkActive="active" [routerLink]="[link.view]"
         [class.disabled]="isDisabled">
        {{link.label}}
      </a>
    </li>
  }
</ul>

<!-- SMALL SCREEN TABS -->
<nav class="hide-print d-flex d-lg-none tabs subtabs progress-tabs process-heating-assessment flex-wrap flex-fill">
  <ul class="pagination d-flex justify-content-between tabs subtabs progress-tabs flex-fill process-heating-assessment">
    <li class="page-item" [class.disabled]="!canGoBack()">
      <a class="nav-link small" (click)="back()"><span class="fa fa-chevron-left"></span></a>
    </li>
    @for (link of HEAT_BALANCE_VIEW_LINKS; track $index) {
      @let isDisabled = isLinkDisabled(link);
      <li class="page-item" routerLinkActive="active"
          [class.disabled]="isDisabled"
          (click)="handleCanNavigate($event, link)" [routerLink]="[link.view]">
        <a class="nav-link small" routerLinkActive="active" [routerLink]="[link.view]"
           [class.disabled]="isDisabled">
          {{link.label}}
        </a>
      </li>
    }
    <li class="page-item" [class.disabled]="!canContinue()">
      <a class="nav-link small" (click)="continue()"><span class="fa fa-chevron-right"></span></a>
    </li>
  </ul>
</nav>
