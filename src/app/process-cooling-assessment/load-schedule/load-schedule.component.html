@if (chillerInventory.length > 0) {
  <div class="load-schedule-chillers p-3">
    @for (chillerInventoryItem of chillerInventory; track chillerInventoryItem.itemId) {
    <app-chiller-load-schedule [chiller]="chillerInventoryItem"></app-chiller-load-schedule>
    }
  </div>
} @else {
  <p>No chillers found. Visit the inventory tab to add chillers.</p>
}
