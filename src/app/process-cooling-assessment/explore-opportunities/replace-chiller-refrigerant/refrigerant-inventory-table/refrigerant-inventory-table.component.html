<div *ngIf="inventoryUIState$ | async as inventoryState" class="card p-2">
    <div class="card-body p-0" *ngIf="inventoryState.inventory && inventoryState.inventory.length > 0">
        <table class="table table-sm table-striped table-hover mb-0">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Current Refrigerant</th>
                    <th>Proposed Refrigerant</th>
                </tr>
            </thead>
            <tbody>
                @for (chillerInventoryItem of (inventoryState.inventory | filterChillerInventory: filterInventoryParams()); track chillerInventoryItem.itemId) {
                <tr [class.invalid-item]="!inventoryValidState().items[chillerInventoryItem.itemId]">
                    <td>
                        {{chillerInventoryItem.name}}
                    </td>
                    <td>{{chillerInventoryItem.refrigerantType | refrigerantType}}</td>
                    <td>
                        <select class="form-control form-control-sm"
                            [ngModel]="chillerInventoryItem.proposedRefrigerantType ?? null"
                            (ngModelChange)="setProposedRefrigerant(chillerInventoryItem, $event)">
                            <option *ngFor="let type of refrigerantTypes" [ngValue]="type.value">{{ type.name }}</option>
                        </select>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
