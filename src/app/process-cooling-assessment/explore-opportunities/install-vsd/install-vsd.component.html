<div>
    <label class="group-label" for="useInstallVSD">
        <input class="pc-checkbox" type="checkbox"
            id="useInstallVSD"
            (focus)="focusField('useInstallVSD')"
            (change)="setUseOpportunity()"
            [(ngModel)]="useOpportunity" />
        <span class="ml-2">
            {{ EEM_LABELS.installVSDOnCentrifugalCompressors }}
        </span>
    </label>
</div>

@if(useOpportunity && form) {
    <div class="row no-gutters">
        <div class="alert alert-info my-2 w-100 small">
            The chillers below will have their compressor motors upgraded to VSDs.
        </div>
        <app-vsd-inventory-table class="w-100"></app-vsd-inventory-table>
    </div>
}
