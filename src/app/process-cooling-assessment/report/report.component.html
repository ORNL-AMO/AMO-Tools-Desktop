@if (assessment$ | async; as assessment) {

<div class="report-container">
    <div class="d-none d-lg-flex">
        <ul #reportBtns class="tabs primary">
            @for (link of REPORT_VIEW_LINKS; track $index) {
            <li routerLinkActive="active" [routerLink]="[link.view]" [class.disabled]="link.meta?.disabled">
                <a [routerLink]="[link.view]" [class.disabled]="link.meta?.disabled">
                    {{link.label}}
                </a>
            </li>
            }
        </ul>
        <app-export-button
            class="ml-auto align-self-center mr-2"
            [document]="reportDocument$"
            [assessmentName]="assessment.name"
            [sectionGroups]="sectionGroups">
        </app-export-button>
    </div>

    <!--  SMALL SCREEN STYLE -->
    <div class="d-flex d-lg-none flex-column">
        <div #reportBtns class="tabs primary">
            <div class="mx-auto pl-2 align-items-center justify-content-center" (click)="collapseTabs()">
                @if (!tabsCollapsed) { <span class="fa fa-caret-up pr-2"></span> }
                @if (tabsCollapsed) { <span class="fa fa-caret-down pr-2"></span> }
                <span class="small text-uppercase">Menu</span>
            </div>
            @for (link of REPORT_VIEW_LINKS; track $index) {
            <div routerLinkActive="active" [class.disabled]="link.meta?.disabled" [routerLink]="[link.view]">
                <a [routerLink]="[link.view]" [class.disabled]="link.meta?.disabled">
                    {{link.label}}
                </a>
            </div>
            }
        </div>
        <app-export-button
            class="mx-2 mb-2"
            [document]="reportDocument$"
            [assessmentName]="assessment.name"
            [sectionGroups]="sectionGroups">
        </app-export-button>
    </div>

    <div class="assessment-container tab-content">
        <div class="assessment-panel-container modification">
            <router-outlet></router-outlet>
        </div>
    </div>
</div>
}
