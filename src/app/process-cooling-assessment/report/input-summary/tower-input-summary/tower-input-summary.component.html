<div class="card summary-card">
  <div class="card-header" (click)="toggleCollapse()">
    <h5>Tower Input
      <span class="pull-right fa hide-print" [class.fa-chevron-up]="collapse" [class.fa-chevron-down]="!collapse"></span>
    </h5>
  </div>
  @if (!collapse) {
  <div class="card-body">
    @let inputSummaryUI = inputSummaryUI$ | async;
    @if (inputSummaryUI) {
      <div class="output-summary">
        <app-input-summary-table
          [sections]="inputSummaryUI.towerSections"
          [modificationNames]="inputSummaryUI.modificationNames">
        </app-input-summary-table>
      </div>
    }
    <app-exportable-results-table [tableString]="copyTableString"
      (updateTableString)="updateCopyTableString()"></app-exportable-results-table>
  </div>
  }
</div>
