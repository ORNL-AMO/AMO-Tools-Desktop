<div class="card summary-card">
  <div class="card-header" (click)="toggleCollapse()">
    <h5>System Information
      <span class="pull-right fa hide-print" [ngClass]="{'fa-chevron-up': collapse, 'fa-chevron-down': !collapse}"></span>
    </h5>
  </div>
  <div class="card-body" *ngIf="!collapse || printView">
    @let inputSummaryUI = inputSummaryUI$ | async;
    @if (inputSummaryUI) {
      <div #copyTable class="output-summary">
        <table class="table table-hover table-striped">
          <thead>
            <tr>
              <th [ngStyle]="{'width.%': 100 / (inputSummaryUI.modificationNames.length + 2)}"></th>
              <th [ngStyle]="{'width.%': 100 / (inputSummaryUI.modificationNames.length + 2)}">Baseline</th>
              <th *ngFor="let mod of inputSummaryUI.modificationNames"
                  [ngStyle]="{'width.%': 100 / (inputSummaryUI.modificationNames.length + 2)}">
                {{mod.name}}
              </th>
            </tr>
          </thead>
        </table>
        <app-system-info-input-table
          [operationSummaryRows]="inputSummaryUI.operationSummaryRows"
          [modificationNames]="inputSummaryUI.modificationNames">
        </app-system-info-input-table>
      </div>
    }
    <app-exportable-results-table [tableString]="copyTableString"
      (updateTableString)="updateCopyTableString()"></app-exportable-results-table>
  </div>
</div>
