<div [style.background-color]="'#fff'" class="p-3">

        <div class="d-flex justify-content-start">
            <label class="p-2 mb-0 d-flex align-items-center">
                <input type="checkbox" id="showFactoredCurve" class="pc-checkbox mr-1" [checked]="showFactored()" (change)="onShowFactoredChange($event)" />
                Show Factored Curve
            </label>
        </div>
    }
    <div #chillerProfileChart></div>
</div>
